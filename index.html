<head>

<style>
:root{
  --bg:#0f1115; --panel:#171a21; --panel2:#1d2029; --border:#2a2f3a;
  --text:#e9ecf1; --sub:#aab1bf; --muted:#6b7280;
  --accent:#8b5cf6; --accent2:#22d3ee; --own:#f59e0b;
  --good:#10b981; --bad:#ef4444; --warn:#f59e0b;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",Pretendard,Arial,sans-serif;
  font-size:14px;line-height:1.55}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}
header{position:sticky;top:0;z-index:30;background:#0b0d12cc;backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding:14px 22px;display:flex;align-items:center;gap:20px}
header h1{margin:0;font-size:18px;font-weight:700}
header .stat{color:var(--sub);font-size:13px}
header .stat b{color:var(--text);margin:0 4px}
.key-slot{display:flex;align-items:center;gap:6px;margin-left:12px}
.key-slot input{background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:6px 10px;border-radius:6px;font-size:12px;width:170px;font-family:monospace}
.key-slot .dot{width:8px;height:8px;border-radius:50%;background:#6b7280}
.key-slot .dot.ok{background:var(--good)}
nav{display:flex;gap:4px;margin-left:auto}
nav button{background:none;color:var(--sub);border:0;padding:8px 14px;
  border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
nav button:hover{background:var(--panel)}
nav button.active{background:var(--accent);color:#fff}
main{padding:22px;max-width:1440px;margin:0 auto}
.grid{display:grid;gap:14px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
.card h2{margin:0 0 14px;font-size:16px;display:flex;align-items:center;gap:10px}
.card h3{margin:0 0 10px;font-size:14px;color:var(--sub);font-weight:600}
.row{display:flex;gap:14px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;
  font-size:11px;background:var(--panel2);color:var(--sub);border:1px solid var(--border)}
.chip.own{background:rgba(245,158,11,.18);color:#fbbf24;border-color:rgba(245,158,11,.35)}
.chip.rank{background:rgba(139,92,246,.18);color:#c4b5fd;border-color:rgba(139,92,246,.35);font-weight:700}
.chip.hero{background:rgba(34,211,238,.12);color:#67e8f9;border-color:rgba(34,211,238,.25)}
.chip.unmet{background:rgba(239,68,68,.12);color:#fca5a5;border-color:rgba(239,68,68,.25)}
.chip.met{background:rgba(16,185,129,.12);color:#6ee7b7;border-color:rgba(16,185,129,.25)}
.chip.sev-critical{background:rgba(239,68,68,.22);color:#fecaca;border-color:rgba(239,68,68,.4)}
.chip.sev-moderate{background:rgba(245,158,11,.18);color:#fcd34d;border-color:rgba(245,158,11,.3)}
.chip.sev-minor{background:rgba(107,114,128,.25);color:#d1d5db;border-color:rgba(107,114,128,.4)}
button.chip{cursor:pointer}
button.chip:hover{filter:brightness(1.2)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-tile{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px}
.stat-tile .num{font-size:24px;font-weight:700;margin:4px 0}
.stat-tile .lbl{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:2fr 3fr 2fr;gap:14px}
@media(max-width:1000px){.two-col,.three-col{grid-template-columns:1fr}.stat-grid{grid-template-columns:repeat(2,1fr)}}
.prod{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:.15s}
.prod:hover{border-color:var(--accent);transform:translateY(-1px)}
.prod.own{border-left:3px solid var(--own)}
.prod .top-line{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.prod .name{font-weight:600;font-size:13px;margin:2px 0 6px;line-height:1.35}
.prod .brand{color:var(--sub);font-size:12px}
.prod .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filters input{background:var(--panel2);border:1px solid var(--border);color:var(--text);

.filters .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.filters .seg button{background:none;color:var(--sub);border:0;padding:7px 14px;font-size:12px;cursor:pointer;font-weight:600}
.filters .seg button.active{background:var(--accent);color:#fff}
.quote{background:#fff;color:#111827;border-radius:8px;padding:10px 12px;font-size:13px;
  border-left:3px solid var(--accent);margin:6px 0;line-height:1.5}
.quote .qmeta{font-size:11px;color:#6b7280;display:flex;gap:6px;align-items:center;margin-bottom:4px}
.quote .qmeta .chip{background:#f3f4f6;color:#374151;border-color:#e5e7eb}
.quote .qmeta .chip.own{background:#fef3c7;color:#92400e;border-color:#fcd34d}
.quote .qmeta .chip.rank{background:#ede9fe;color:#6d28d9;border-color:#ddd6fe}
.unmet-item{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.unmet-item .head{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.unmet-item .head .need{font-weight:600;font-size:14px;flex:1;min-width:200px}
.unmet-item .freq{color:var(--sub);font-size:12px}
.hero-row{display:flex;justify-content:space-between;gap:10px;padding:10px 12px;
  background:var(--panel2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;align-items:center}
.hero-row:hover{border-color:var(--accent2)}
.hero-row .name{font-weight:600}
.hero-row .count{color:var(--sub);font-size:12px}
.drill{position:fixed;inset:0;background:#000c;backdrop-filter:blur(6px);z-index:50;display:none;
  align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px}
.drill.show{display:flex}
.drill-panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;
  max-width:920px;width:100%;padding:24px;margin-top:20px}
.drill-close{float:right;background:none;color:var(--sub);border:0;font-size:22px;cursor:pointer}
.drill h2{margin-top:0;font-size:18px}
.chart-box{position:relative;height:240px}
.meta-kv{font-size:12px;color:var(--sub);margin:2px 0}
.meta-kv b{color:var(--text);font-weight:600}
.badge-own{background:var(--own);color:#000;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.missing{color:var(--muted);font-style:italic;font-size:12px;padding:8px}
hr{border:0;border-top:1px solid var(--border);margin:14px 0}
.side-list{max-height:520px;overflow-y:auto;padding-right:4px}
.side-list::-webkit-scrollbar{width:6px}
.side-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.compare-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.compare-col{background:var(--panel2);border-radius:8px;padding:12px}
.compare-col.own{border-top:3px solid var(--own)}
.compare-col.comp{border-top:3px solid var(--accent2)}
.compare-col h4{margin:0 0 8px;font-size:13px;display:flex;gap:6px;align-items:center}
</style>

<script>
// ──────────────── DATA LOAD ────────────────
const DATA = JSON.parse(document.getElementById('__DATA__').textContent || '[]');
const COMP = DATA.filter(p => !p.is_own_brand);
const OWN  = DATA.filter(p =>  p.is_own_brand);

// ──────────────── HELPERS ────────────────
const el = (html) => { const d = document.createElement('div'); d.innerHTML = html.trim(); return d.firstChild; };
const esc = (s) => (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const truncate = (s,n=60) => { s=(s||'').toString(); return s.length>n?s.slice(0,n)+'…':s; };
const fmtDate = (d) => {
  if (!d) return '';
  const s = String(d);
  // YYYY.MM.DD 또는 YYYY-MM-DD 형식 먼저 시도
  const m = s.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if (m) return `${m[1]}.${m[2].padStart(2,'0')}.${m[3].padStart(2,'0')}`;
  return s.slice(0,10);
};
const getHeroes = (p) => ((p.analysis||{}).hero_ingredients||[]).map(h => (h.name||'').trim()).filter(Boolean);
// Claude가 "리뷰 없어서 분석 불가" 같은 쓰레기 응답 필터링
const GARBAGE_RX = /(리뷰\s*데이터|리뷰\s*원문|리뷰\s*부족|분석\s*불가|제공되지\s*않아|리뷰\s*없)/;
const isGarbage = (u) => GARBAGE_RX.test(u.need||'') || GARBAGE_RX.test(u.representative_quote||'');
const getUnmets = (p) => ((p.analysis||{}).unmet_needs||[]).filter(u=>!isGarbage(u));
const getMets = (p) => ((p.analysis||{}).met_needs||[]);

// 저평점 리뷰 원문을 Unmet 스타일로 래핑 (Claude 분석 대체)
function lowReviewAsUnmet(product){
  const low = (product._low_sample||[]).filter(r=>{
    const rt = parseFloat(r.rating); return !isNaN(rt) && rt<=3 && (r.text||'').length>15;
  });
  return low.map(r=>({
    need: (r.text||'').slice(0,60)+((r.text||'').length>60?'…':''),
    severity: (parseFloat(r.rating)<=2?'critical':'moderate'),
    frequency: `${r.rating}점`,
    quote: r.text||'',
    examples: [r.text||''],
    product: product,
    date: r.date,
    _raw: true
  }));
}

function nameOf(p){
  // [...] 로 감싼 홍보 태그 제거 (맨앞/중간 모두)
  let n = (p.name||'').replace(/\[[^\]]*\]/g, '').replace(/\s+/g,' ').trim();
  // 브랜드 prefix 중복도 제거
  if (p.brand && n.startsWith(p.brand)) n = n.slice(p.brand.length).trim();
  return n || (p.name||'').trim();
}

// severity chip class
const sevCls = (s) => {
  const k = (s||'').toLowerCase();
  if (k.includes('crit')) return 'sev-critical';
  if (k.includes('mod'))  return 'sev-moderate';
  return 'sev-minor';
};

// collect unmet needs. analyzed unmet 우선, 없으면 저평점 리뷰 원문
function allUnmetNeeds(products, {includeRaw=true}={}){
  const out = [];
  products.forEach(p=>{
    const clean = getUnmets(p);
    if (clean.length){
      clean.forEach(u=>{
        out.push({
          need: u.need, severity: u.severity, frequency: u.frequency,
          quote: u.representative_quote || (u.verbatim_examples||[])[0] || '',
          examples: u.verbatim_examples || [],
          product: p, _raw: false
        });
      });
    } else if (includeRaw){
      // Claude 분석 없음 → 저평점 리뷰 원문을 대체 인사이트로 사용
      out.push(...lowReviewAsUnmet(p));
    }
  });
  return out;
}

function allHeroIngredients(products){
  const map = new Map();
  products.forEach(p=>{
    getHeroes(p).forEach(name=>{
      if (!map.has(name)) map.set(name, []);
      map.get(name).push(p);
    });
  });
  return [...map.entries()].sort((a,b)=>b[1].length-a[1].length);
}

// ──────────────── VIEW ROUTING ────────────────
const view = document.getElementById('view');
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  render(b.dataset.tab);
});

function render(tab){
  const fn = {overview:renderOverview, products:renderProducts, unmet:renderUnmet, hero:renderHero, own:renderOwn}[tab];
  view.innerHTML=''; if(fn) fn();
}

// Header stats — 실제 저평점 리뷰 개수 집계
let _lowRevCnt = 0;
COMP.forEach(p=>(p._low_sample||[]).forEach(r=>{const rt=parseFloat(r.rating); if(!isNaN(rt)&&rt<=3) _lowRevCnt++;}));
OWN.forEach(p=>(p._low_sample||[]).forEach(r=>{const rt=parseFloat(r.rating); if(!isNaN(rt)&&rt<=3) _lowRevCnt++;}));
document.getElementById('hdrStat').innerHTML =
  `타사 TOP <b>${COMP.length}</b> · 자사 <b>${OWN.length}</b> · 저평점 리뷰 <b>${_lowRevCnt}</b> · 히어로 성분 <b>${allHeroIngredients(COMP).length}</b>`;

// ──────────────── OVERVIEW ────────────────
function renderOverview(){
  const unmets = allUnmetNeeds(COMP);
  const heroes = allHeroIngredients(COMP);
  // 실제 저평점 리뷰 수
  let totalLow = 0, critLow = 0;
  COMP.forEach(p=>(p._low_sample||[]).forEach(r=>{
    const rt=parseFloat(r.rating);
    if (!isNaN(rt) && rt<=3){ totalLow++; if (rt<=2) critLow++; }
  }));

  // 브랜드별 제품 수 (타사)
  const brandMap = {};
  COMP.forEach(p=>{ const b=p.brand||'?'; brandMap[b]=(brandMap[b]||0)+1; });
  const topBrands = Object.entries(brandMap).sort((a,b)=>b[1]-a[1]).slice(0,10);

  view.innerHTML = `
  <div class="grid">
    <div class="card">
      <div class="stat-grid">
        <div class="stat-tile"><div class="lbl">타사 TOP 50</div><div class="num">${COMP.length}</div></div>
        <div class="stat-tile"><div class="lbl">자사 제품</div><div class="num" style="color:var(--own)">${OWN.length}</div></div>
        <div class="stat-tile"><div class="lbl">저평점 리뷰(≤3점)</div><div class="num" style="color:#fca5a5">${totalLow}</div></div>
        <div class="stat-tile"><div class="lbl">1~2점 리뷰 (심각)</div><div class="num" style="color:var(--bad)">${critLow}</div></div>
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <h2>🧪 히어로 성분 TOP 10 (타사)</h2>
        <div class="chart-box"><canvas id="heroChart"></canvas></div>
      </div>
      <div class="card">
        <h2>🏷 브랜드별 제품 수 (타사)</h2>
        <div class="chart-box"><canvas id="brandChart"></canvas></div>
      </div>
    </div>

    <div class="card">
      <h2>🔥 저평점 리뷰 하이라이트 (상위 8)</h2>
      <p style="color:var(--sub);font-size:12px;margin:-4px 0 10px">
        별점 3점 이하 리뷰 중 가장 대표적인 원문. 브랜드별 최대 2개.
      </p>
      <div id="topUnmets"></div>
    </div>
  </div>
  `;

  // Charts
  const heroEntries = heroes.slice(0,10);
  new Chart(document.getElementById('heroChart'), {
    type:'bar',
    data:{labels:heroEntries.map(([n])=>truncate(n,18)), datasets:[{label:'제품 수', data:heroEntries.map(([,list])=>list.length), backgroundColor:'#67e8f9'}]},
    options:{indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{ticks:{color:'#aab1bf',precision:0,stepSize:1},grid:{color:'#2a2f3a'}},y:{ticks:{color:'#aab1bf'}}}}
  });
  new Chart(document.getElementById('brandChart'), {
    type:'bar',
    data:{labels:topBrands.map(([b])=>truncate(b,16)), datasets:[{label:'제품 수', data:topBrands.map(([,c])=>c), backgroundColor:'#c4b5fd'}]},
    options:{indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{ticks:{color:'#aab1bf',precision:0,stepSize:1},grid:{color:'#2a2f3a'}},y:{ticks:{color:'#aab1bf'}}}}
  });

  // 개요에서는 저평점 리뷰 원문 하이라이트 (Claude 분석이 거의 없으므로)
  const rawLows = [];
  COMP.forEach(p=>{
    (p._low_sample||[]).forEach(r=>{
      const rt = parseFloat(r.rating);
      if (!isNaN(rt) && rt<=3 && (r.text||'').length>15) rawLows.push({...r, product:p});
    });
  });
  // 별점 낮은순 + 텍스트 긴 순
  rawLows.sort((a,b)=>{
    const ra=parseFloat(a.rating)||99, rb=parseFloat(b.rating)||99;
    if (ra!==rb) return ra-rb;
    return (b.text||'').length - (a.text||'').length;
  });
  const tuBox = document.getElementById('topUnmets');
  // 브랜드 다양성 위해 같은 브랜드 2개 넘지 않도록
  const brandCnt = {};
  const picked = [];
  for (const r of rawLows){
    const b = r.product.brand||'?';
    if ((brandCnt[b]||0)>=2) continue;
    brandCnt[b]=(brandCnt[b]||0)+1;
    picked.push(r);
    if (picked.length>=8) break;
  }
  // 간단 요약 추출: 첫 문장 or 첫 절 (마침표/줄바꿈/느낌표 전까지), 최대 50자
  const summarize = (text) => {
    const t = (text||'').replace(/\s+/g,' ').trim();
    // 첫 문장 끊기
    const m = t.match(/^[^.!?\n。…]*[.!?。…]/);
    let s = (m ? m[0] : t).trim();
    if (s.length > 55) s = s.slice(0,55).replace(/[,\s]+$/,'') + '…';
    // 여전히 너무 짧으면 원문 앞부분 사용
    if (s.length < 10) s = t.slice(0,55) + (t.length>55?'…':'');
    return s;
  };

  picked.forEach(r=>{
    const sev = parseFloat(r.rating)<=2?'critical':'moderate';
    const fullText = r.text||'';
    const summary = summarize(fullText);
    const isLong = fullText.length > summary.length + 3;
    const uid = 'u_'+Math.random().toString(36).slice(2,9);

    const pname = truncate(nameOf(r.product), 40);
    const dateStr = fmtDate(r.date);
    const metaLine = `${esc(r.product.brand||'')} · ${esc(pname)} · #${r.product.rank}${dateStr?` · 📅 ${esc(dateStr)}`:''}`;
    const div = el(`<div class="unmet-item" style="cursor:${isLong?'pointer':'default'}" data-uid="${uid}">
      <div class="head">
        <span class="chip ${sevCls(sev)}">${r.rating}점</span>
        <div class="need">${esc(summary)}</div>
        <span class="freq" style="text-align:right">${metaLine}${isLong?' <span style="opacity:.6;margin-left:4px">▼ 전문</span>':''}</span>
      </div>
      <div class="full-q" style="display:none">
        <div class="quote" style="border-left-color:var(--bad);margin-top:8px">
          <div class="qmeta">${r.skinType?`<span class="chip">${esc(r.skinType)}</span>`:''}<span class="chip">${r.rating}점</span>${dateStr?`<span class="chip">📅 ${esc(dateStr)}</span>`:''}${r.isRepurchase?'<span class="chip">재구매</span>':''}</div>
          ${esc(fullText)}
        </div>
      </div>
    </div>`);

    const viewFull = div.querySelector('.full-q');
    const caret = div.querySelector('.freq');
    if (isLong){
      div.addEventListener('click', (e)=>{
        if (e.target.tagName === 'BUTTON') return;
        const open = viewFull.style.display === 'block';
        viewFull.style.display = open ? 'none' : 'block';
        if (caret) caret.innerHTML = `${metaLine} <span style="opacity:.6;margin-left:4px">${open?'▼':'▲'} 전문</span>`;
      });
    }
    const btn = el(`<button class="chip" style="margin-top:6px">제품 전체 리뷰 보기 →</button>`);
    btn.onclick = (e)=>{ e.stopPropagation(); openProduct(r.product); };
    div.appendChild(btn);
    tuBox.appendChild(div);
  });
  if (!picked.length) tuBox.innerHTML = '<div class="missing">저평점 리뷰 샘플이 없습니다.</div>';
}

let productFilters = {q:'', scope:'all'};
function renderProducts(){
  view.innerHTML = `
  <div class="card">

function paintProducts(){
  const grid = document.getElementById('prodGrid');
  let list = [];
  if (productFilters.scope==='all') list = DATA;
  else if (productFilters.scope==='comp') list = COMP;
  else list = OWN;

  if (q) list = list.filter(p=>(p.name||'').toLowerCase().includes(q) || (p.brand||'').toLowerCase().includes(q));
  document.getElementById('pCount').textContent = `${list.length}개`;
  grid.innerHTML='';
  list.forEach(p=>grid.appendChild(productCard(p)));

function productCard(p){
  const heroes = getHeroes(p).slice(0,3);
  const unmetCount = getUnmets(p).length;
  const d = el(`<div class="prod ${p.is_own_brand?'own':''}">

      ${p.is_own_brand ? '<span class="badge-own">자사</span>' : `<span class="chip rank">#${p.rank}</span>`}

    <div class="tags">
      ${heroes.map(h=>`<span class="chip hero">🧪 ${esc(h)}</span>`).join('')}
      ${unmetCount?`<span class="chip unmet">😤 ${unmetCount}</span>`:''}
    </div>
  </div>`);
  d.onclick = ()=>openProduct(p);
  return d;
}

// ──────────────── UNMET TAB ────────────────
function renderUnmet(){
  // 타사 + 자사 합쳐서 모든 저평점 리뷰 + 클린 unmet 병합
  const unmets = allUnmetNeeds(DATA);
  const bySev = {critical:[], moderate:[], minor:[]};
  unmets.forEach(u=>{
    const k = (u.severity||'moderate').toLowerCase();
    if (k.includes('crit')) bySev.critical.push(u);
    else if (k.includes('mod')) bySev.moderate.push(u);
    else bySev.minor.push(u);
  });

  view.innerHTML = `
  <div class="card">
    <p style="color:var(--sub);font-size:13px;margin:-4px 0 12px">
      Claude 분석 결과(있을 경우) + 별점 3점 이하 리뷰 원문. 평점 낮은 순 정렬.
    </p>
    <div class="filters">
      <div class="seg">
        <button class="sev-btn active" data-sev="all">전체 (${unmets.length})</button>
        <button class="sev-btn" data-sev="critical">1~2점 (${bySev.critical.length})</button>
        <button class="sev-btn" data-sev="moderate">3점 (${bySev.moderate.length})</button>
      </div>
      <input id="uq" placeholder="🔍 키워드 검색..." />
      <label style="color:var(--sub);font-size:12px;display:flex;align-items:center;gap:6px"><input type="checkbox" id="ownOnly"> 자사만</label>
    </div>
    <div id="unmetList"></div>
  </div>`;

  let sevFilter = 'all';
  const paint = ()=>{
    const q = document.getElementById('uq').value.toLowerCase();
    const ownOnly = document.getElementById('ownOnly').checked;
    const box = document.getElementById('unmetList');
    box.innerHTML='';
    let list = unmets;
    if (sevFilter!=='all') list = bySev[sevFilter];
    if (ownOnly) list = list.filter(u=>u.product.is_own_brand);
    if (q) list = list.filter(u=>(u.need||'').toLowerCase().includes(q) || (u.quote||'').toLowerCase().includes(q));
    // 평점 낮은 순 정렬 (_raw인 경우 frequency=X점)
    list = [...list].sort((a,b)=>{
      const ra = parseFloat((a.frequency||'').replace(/[^0-9.]/g,''))||5;
      const rb = parseFloat((b.frequency||'').replace(/[^0-9.]/g,''))||5;
      return ra-rb;
    });
    list.slice(0,100).forEach(u=>{
      const div = el(`<div class="unmet-item">
        <div class="head">
          <span class="chip ${sevCls(u.severity)}">${esc(u.severity||'moderate')}</span>
          ${u._raw?'<span class="chip">원문</span>':'<span class="chip met">Claude 분석</span>'}
          <div class="need">${esc(truncate(u.need, 120))}</div>
          <span class="freq">${esc(u.frequency||'')}</span>
        </div>
      </div>`);
      const q = u.quote || (u.examples[0]||'');
      if (q && q !== u.need){
        const meta = `<div class="qmeta">${u.product.is_own_brand?'<span class="chip own">자사</span>':''}${u.product.rank<900?`<span class="chip rank">#${u.product.rank}</span>`:''}<span class="chip">${esc(u.product.brand||'')}</span>${u.date?`<span class="chip">📅 ${esc(fmtDate(u.date))}</span>`:''} <span style="color:#6b7280">${esc(truncate(nameOf(u.product),42))}</span></div>`;
        div.appendChild(el(`<div class="quote" style="border-left-color:${u._raw?'var(--bad)':'var(--accent)'}">${meta}${esc(truncate(q,300))}</div>`));
      }
      const viewBtn = el(`<button class="chip" style="margin-top:6px">제품 보기 →</button>`);
      viewBtn.onclick = ()=>openProduct(u.product);
      div.appendChild(viewBtn);
      box.appendChild(div);
    });
    if (list.length>100){
      box.appendChild(el(`<div class="missing">…추가 ${list.length-100}개는 필터/검색으로 좁혀주세요</div>`));
    }
    if (!list.length) box.innerHTML = '<div class="missing">해당 조건의 unmet needs가 없습니다.</div>';
  };
  document.querySelectorAll('.sev-btn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.sev-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); sevFilter=b.dataset.sev; paint();
  });
  document.getElementById('uq').oninput = paint;
  document.getElementById('ownOnly').onchange = paint;
  paint();
}

// ──────────────── OWN BRAND TAB ────────────────
function renderOwn(){
  // own brand keyword inference from name
  function inferCategory(p){
    const n = (p.name||'').toLowerCase();
    if (n.includes('토너')) return '토너';
    if (n.includes('세럼')||n.includes('앰플')||n.includes('에센스')) return '세럼/앰플';
    if (n.includes('크림')) return '크림';
    if (n.includes('패드')) return '패드';
    if (n.includes('마스크')||n.includes('팩')) return '마스크/팩';
    if (n.includes('클렌')) return '클렌징';
    if (n.includes('선')||n.includes('sun')) return '선케어';
    if (n.includes('로션')||n.includes('에멀전')) return '로션';
    return '기타';
  }
  // categorize
  const catMap = {};
  OWN.forEach(p=>{ const c=inferCategory(p); (catMap[c]=catMap[c]||[]).push(p); });

  view.innerHTML = `
  <div class="grid">
    <div class="card">
      <h2>🏷 자사 브랜드 · 더랩바이블랑두 <span class="chip own" style="margin-left:8px">${OWN.length}개 제품</span></h2>
      <p style="color:var(--sub);font-size:13px;margin:0 0 12px">
        올리브영에서 검색된 전체 ${OWN.length}개 제품. 카테고리별 제품 구성을 확인하고, 타사 경쟁 제품과 비교하세요.
      </p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${Object.entries(catMap).map(([c,list])=>`<span class="chip hero">${esc(c)} ${list.length}</span>`).join('')}
      </div>
    </div>

    <div class="card">
      <h2>📋 자사 제품 리스트</h2>
      <div id="ownGrid" class="grid" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr))"></div>
    </div>

    <div class="card">
      <h2>🆚 타사 경쟁 제품 비교 (카테고리 기반)</h2>
      <p style="color:var(--sub);font-size:13px;margin:0 0 12px">
        자사 제품과 같은 카테고리의 타사 TOP 50 제품을 매칭해서 Unmet Needs를 비교합니다.
      </p>
      <div id="compareBlock"></div>
    </div>
  </div>`;

  // own grid
  const og = document.getElementById('ownGrid');
  OWN.forEach(p=>og.appendChild(productCard(p)));

  // comparison
  const cb = document.getElementById('compareBlock');
  Object.entries(catMap).forEach(([cat, ownList])=>{
    // find comp products matching this category
    const compMatch = COMP.filter(p=>inferCategory(p)===cat);
    if (!compMatch.length) return;
    // aggregate unmet needs from comp
    const unmets = allUnmetNeeds(compMatch);
    const div = el(`<div style="margin-bottom:18px">
      <h3>카테고리: ${esc(cat)} <span class="chip" style="margin-left:6px">자사 ${ownList.length} vs 타사 ${compMatch.length}</span></h3>
      <div class="compare-row">
        <div class="compare-col own">
          <h4><span class="badge-own">자사</span> 더랩바이블랑두 ${esc(cat)} ${ownList.length}개</h4>
          <div style="font-size:12px;color:var(--sub);margin-bottom:6px">대표 제품:</div>
          ${ownList.slice(0,3).map(p=>`<div style="font-size:12px;margin:3px 0">· ${esc(truncate(nameOf(p),60))}</div>`).join('')}
          ${(()=>{
            // 자사 저평점 리뷰 샘플 모으기
            const samples = [];
            ownList.forEach(p=>{
              ((p._low_sample||[]).slice(0,2)).forEach(r=> samples.push({...r, product:p}));
            });
            if (!samples.length) return '<div style="font-size:12px;color:var(--muted);margin-top:10px;font-style:italic">저평점 리뷰 없음</div>';
            return `<h4 style="margin-top:10px">😤 자사 저평점 리뷰</h4>` +
              samples.slice(0,3).map(r=>`<div style="font-size:12px;margin:4px 0;color:#fca5a5">· ${esc(r.rating||'?')}점 — "${esc(truncate(r.text||'',80))}"</div>`).join('');
          })()}
        </div>
        <div class="compare-col comp">
          <h4>🎯 타사 ${esc(cat)} Unmet Needs TOP 3</h4>
          <div id="cmp-${esc(cat)}"></div>
        </div>
      </div>
    </div>`);
    cb.appendChild(div);
    const tgt = div.querySelector(`[id="cmp-${esc(cat)}"]`);
    // top 3 distinct unmet needs
    const seen = new Set();
    let shown = 0;
    unmets.forEach(u=>{
      if (shown>=3) return;
      if (seen.has(u.need)) return;
      seen.add(u.need);
      shown++;
      const q = u.quote||'';
      tgt.appendChild(el(`<div style="margin-bottom:8px">
        <div style="font-weight:600;font-size:13px"><span class="chip ${sevCls(u.severity)}">${esc(u.severity||'')}</span> ${esc(u.need)}</div>
        ${q?`<div style="font-size:12px;color:var(--sub);margin-top:3px">"${esc(truncate(q,100))}" <span style="color:var(--muted)">— ${esc(u.product.brand||'')} #${u.product.rank}</span></div>`:''}
      </div>`));
    });
    if (!shown) tgt.innerHTML = '<div class="missing">타사 unmet 데이터 없음</div>';
  });
  if (!cb.children.length) cb.innerHTML = '<div class="missing">매칭되는 타사 카테고리가 없습니다.</div>';
}

function openProduct(p){
  const heroes = ((p.analysis||{}).hero_ingredients||[]);
  const unmets = getUnmets(p);
  const mets = getMets(p);
  const mkts = ((p.analysis||{}).marketing_messages||[]);
  const clin = ((p.analysis||{}).clinical_data||[]);

  const body = `
    <h2>${p.is_own_brand?'<span class="badge-own">자사</span>':`<span class="chip rank">#${p.rank}</span>`} ${esc(p.brand||'')}</h2>

    <div class="meta-kv">평점: <b>${p.avg_rating||'—'}</b> · 리뷰 수집: <b>${p.review_count_collected||0}</b>${p.total_reviews?` · 전체 리뷰: <b>${p.total_reviews}</b>`:''}</div>
    <div style="margin:10px 0"><a href="${esc(p.url||'#')}" target="_blank">🔗 올리브영 상세페이지</a></div>
    ${p.analysis?`
      ${heroes.length?`<h3>🧪 히어로 성분</h3><div class="row">${heroes.map(h=>`<div class="chip hero">${esc(h.name||'')} <span style="opacity:.7;margin-left:4px">${esc(h.emphasis_level||'')}</span></div>`).join('')}</div>`:''}
      ${(p.analysis.brand_positioning)?`<div style="margin:12px 0"><h3>📌 포지셔닝</h3><div style="font-size:13px">${esc(p.analysis.brand_positioning)}</div></div>`:''}
      ${mets.length?`<h3 style="margin-top:16px">✅ Met Needs (${mets.length})</h3>${mets.map(m=>`
        <div class="unmet-item">
          <div class="head"><span class="chip met">${esc(m.strength||'')}</span><div class="need">${esc(m.need||'')}</div><span class="freq">${esc(m.frequency||'')}</span></div>
          ${m.representative_quote?`<div class="quote">${esc(m.representative_quote)}</div>`:''}
        </div>`).join('')}`:''}
      ${unmets.length?`<h3 style="margin-top:16px">😤 Unmet Needs (${unmets.length})</h3>${unmets.map(u=>`
        <div class="unmet-item">
          <div class="head"><span class="chip ${sevCls(u.severity)}">${esc(u.severity||'')}</span><div class="need">${esc(u.need||'')}</div><span class="freq">${esc(u.frequency||'')}</span></div>
          ${u.representative_quote?`<div class="quote">${esc(u.representative_quote)}</div>`:''}
          ${(u.verbatim_examples||[]).slice(1,3).map(v=>`<div class="quote" style="border-left-color:var(--bad)">${esc(v)}</div>`).join('')}
        </div>`).join('')}`:''}
      ${mkts.length?`<h3 style="margin-top:16px">📣 마케팅 메시지</h3>${mkts.slice(0,5).map(m=>`<div style="font-size:13px;color:var(--sub);margin:4px 0">· <span class="chip">${esc(m.type||'')}</span> ${esc(m.message||'')}</div>`).join('')}`:''}
      ${clin.length?`<h3 style="margin-top:16px">🧬 임상/클레임</h3>${clin.slice(0,5).map(c=>`<div style="font-size:13px;color:var(--sub);margin:4px 0">· <span class="chip">${esc(c.test_type||'')}</span> ${esc(c.claim||'')}</div>`).join('')}`:''}
    `:`<div class="missing" style="margin-bottom:12px">Claude 분석 데이터 없음 (리뷰 ${p.review_count_collected||0}개 수집됨)${p.is_own_brand?' · ANTHROPIC_API_KEY 설정 후 재크롤링하면 met/unmet 추가됨':''}</div>`}
    <div id="aiBox" style="margin:16px 0"></div>
    ${((p._low_sample||[]).length) ? `<h3 style="margin-top:16px">😤 평점 낮은순 리뷰 원문 (${(p._low_sample||[]).length}개)</h3>${(p._low_sample||[]).map(r=>`
      <div class="quote" style="border-left-color:var(--bad)">
        <div class="qmeta"><span class="chip">${esc(r.rating||'?')}점</span>${r.date?`<span class="chip">📅 ${esc(fmtDate(r.date))}</span>`:''}${r.skinType?`<span class="chip">${esc(r.skinType)}</span>`:''}${r.isRepurchase?'<span class="chip">재구매</span>':''}</div>
        ${esc(r.text||'')}
      </div>`).join('')}` : ''}
    ${((p._high_sample||[]).length) ? `<h3 style="margin-top:16px">👍 추천순 리뷰 원문 (${(p._high_sample||[]).length}개)</h3>${(p._high_sample||[]).map(r=>`
      <div class="quote">
        <div class="qmeta"><span class="chip">${esc(r.rating||'?')}점</span>${r.date?`<span class="chip">📅 ${esc(fmtDate(r.date))}</span>`:''}${r.skinType?`<span class="chip">${esc(r.skinType)}</span>`:''}${r.isRepurchase?'<span class="chip">재구매</span>':''}</div>
        ${esc(r.text||'')}
      </div>`).join('')}` : ''}
  `;
  document.getElementById('drillBody').innerHTML = body;
  document.getElementById('drill').classList.add('show');
  // AI 분석 UI 주입 (innerHTML 이후 DOM에 aiBox 존재)
  renderAiBlock(p);
}
function closeDrill(){ document.getElementById('drill').classList.remove('show'); }

// ──────────────── AI 분석 ────────────────
const aiCache = {}; // code → result

// 팀 공용 AI 프록시 URL (Apps Script). 비워두면 각자 API 키 입력 방식으로 폴백.
const AI_PROXY_URL = 'https://script.google.com/macros/s/AKfycbxByKYL81FR4DQ3zgdCBsfm710w574R9j5Zhrfrxe4T_s08It1cnEaJu60WdIVwQSNc/exec';
const KEY_STORAGE = 'oy_dashboard_anthropic_key';

// 프록시가 설정돼있으면 API 키 UI 숨기고 "팀 공용 AI" 배지 표시
(function(){
  if (AI_PROXY_URL) {
    const slot = document.querySelector('.key-slot');
    if (slot) slot.innerHTML = '<span class="chip met" title="Apps Script 프록시를 통해 회사 공용 키로 호출됩니다">🤖 팀 공용 AI</span>';
  }
})();

// 로드 시 저장된 키 복원
(function(){
  try {
    const saved = localStorage.getItem(KEY_STORAGE);
    if (saved){
      document.getElementById('apiKey').value = saved;
      document.getElementById('keyRemember').checked = true;
      document.getElementById('keyDot').classList.add('ok');
    }
  } catch(e){}
})();

document.getElementById('apiKey').addEventListener('input', (e)=>{
  const v = e.target.value.trim();
  const dot = document.getElementById('keyDot');
  dot.classList.toggle('ok', /^sk-ant-/.test(v));
  // 저장 체크되어있으면 자동 저장
  if (document.getElementById('keyRemember').checked){
    try { localStorage.setItem(KEY_STORAGE, v); } catch(e){}
  }
});

document.getElementById('keyRemember').addEventListener('change', (e)=>{
  const v = document.getElementById('apiKey').value.trim();
  try {
    if (e.target.checked && v) localStorage.setItem(KEY_STORAGE, v);
    else if (!e.target.checked) localStorage.removeItem(KEY_STORAGE);
  } catch(e){}
});

document.getElementById('keyClear').addEventListener('click', ()=>{
  document.getElementById('apiKey').value = '';
  document.getElementById('keyRemember').checked = false;
  document.getElementById('keyDot').classList.remove('ok');
  try { localStorage.removeItem(KEY_STORAGE); } catch(e){}
});

function getApiKey(){
  return (document.getElementById('apiKey').value||'').trim();
}

function renderAiBlock(p){
  const box = document.getElementById('aiBox');
  if (!box) return;
  const cached = aiCache[p.code];
  if (cached){ renderAiResult(box, cached, p); return; }

  const hasReviews = (p._low_sample||[]).length + (p._high_sample||[]).length >= 3;
  box.innerHTML = `
    <div style="background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-weight:600;font-size:14px">🤖 AI 장/단점 분석</span>
        <span style="color:var(--sub);font-size:12px">Claude가 수집된 리뷰 ${(p._low_sample||[]).length + (p._high_sample||[]).length}개를 분석해 장점/단점을 요약합니다.</span>
        <button id="aiRun" class="chip" style="background:var(--accent);color:#fff;border:none;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer">분석 실행</button>
      </div>
      <div id="aiStatus" style="color:var(--muted);font-size:12px;margin-top:6px">
        ${hasReviews?'버튼을 눌러 분석을 시작하세요. (헤더에 API 키 입력 필요)':'<span style="color:var(--warn)">리뷰가 부족해 분석이 어렵습니다.</span>'}
      </div>
    </div>
  `;
  document.getElementById('aiRun').onclick = ()=>runAi(p);
}

function renderAiResult(box, res, p){
  const pros = res.pros||[], cons = res.cons||[], summary = res.summary||'';
  const persona = res.target_persona||'';
  const rec = res.improvement_suggestions||[];
  box.innerHTML = `
    <div style="background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-weight:700;font-size:14px">🤖 AI 분석 결과</span>
        <button id="aiRerun" class="chip" style="font-size:11px;cursor:pointer">재분석</button>
      </div>
      ${summary?`<div style="font-size:13px;line-height:1.6;margin-bottom:12px;color:var(--text)">${esc(summary)}</div>`:''}
      <div class="compare-row" style="margin-top:4px">
        <div class="compare-col" style="border-top:3px solid var(--good)">
          <h4 style="color:#6ee7b7">👍 강점 (${pros.length})</h4>
          ${pros.map(x=>`<div style="font-size:12px;margin:6px 0"><b style="color:#6ee7b7">· ${esc(x.point||'')}</b>${x.evidence?`<div style="color:var(--sub);margin-left:12px;margin-top:2px">"${esc(truncate(x.evidence,120))}"</div>`:''}</div>`).join('') || '<div class="missing">분석된 강점 없음</div>'}
        </div>
        <div class="compare-col" style="border-top:3px solid var(--bad)">
          <h4 style="color:#fca5a5">👎 약점 (${cons.length})</h4>
          ${cons.map(x=>`<div style="font-size:12px;margin:6px 0"><b style="color:#fca5a5">· ${esc(x.point||'')}</b>${x.evidence?`<div style="color:var(--sub);margin-left:12px;margin-top:2px">"${esc(truncate(x.evidence,120))}"</div>`:''}</div>`).join('') || '<div class="missing">분석된 약점 없음</div>'}
        </div>
      </div>
      ${persona?`<div style="margin-top:12px;font-size:13px"><b>🎯 추천 타겟:</b> <span style="color:var(--sub)">${esc(persona)}</span></div>`:''}
      ${rec.length?`<div style="margin-top:10px"><b style="font-size:13px">💡 개선 제안</b><ul style="margin:6px 0 0;padding-left:20px">${rec.map(r=>`<li style="font-size:12px;color:var(--sub);margin:3px 0">${esc(r)}</li>`).join('')}</ul></div>`:''}
    </div>
  `;
  const rb = document.getElementById('aiRerun');
  if (rb) rb.onclick = ()=>{ delete aiCache[p.code]; renderAiBlock(p); };
}

async function runAi(p){
  const status = document.getElementById('aiStatus');
  const useProxy = !!AI_PROXY_URL;
  const key = useProxy ? null : getApiKey();
  if (!useProxy && !key.startsWith('sk-ant-')){
    status.innerHTML = '<span style="color:var(--bad)">헤더의 API 키 입력란에 Anthropic API 키(sk-ant-...)를 입력해주세요.</span>';
    return;
  }
  status.innerHTML = useProxy ? '⏳ 팀 공용 AI 프록시에 분석 요청 중...' : '⏳ Claude에 분석 요청 중...';
  document.getElementById('aiRun').disabled = true;

  const lows = (p._low_sample||[]).slice(0,15);
  const highs = (p._high_sample||[]).slice(0,5);
  const revText = (lst,label) => lst.map((r,i)=>
    `${label}${i+1}. (${r.rating||'?'}점, ${fmtDate(r.date)||'-'}${r.skinType?', '+r.skinType:''}) ${r.text||''}`
  ).join('\n');
  const prompt = `올리브영 스킨케어 제품에 대한 리뷰를 분석하여 **장점(강점)**과 **단점(약점)**을 추출하세요.

## 제품
- 상품명: ${nameOf(p)}
- 브랜드: ${p.brand||''}
- 순위: ${p.rank<900?`#${p.rank}`:'자사 브랜드'}

## 평점 낮은 리뷰 (${lows.length}개)
${revText(lows,'L')||'(없음)'}

## 추천순 리뷰 (${highs.length}개)
${revText(highs,'H')||'(없음)'}

## 분석 지침
- **강점**: 추천순 리뷰에서 반복적으로 긍정적으로 언급된 포인트 (사용감/효과/가성비 등)
- **약점**: 저평점 리뷰에서 반복적으로 불만 제기된 포인트 (자극/효과부재/발림성/향/가격 등)
- 각 항목마다 실제 리뷰 원문에서 근거 발췌(evidence) 1문장 포함
- 최소 3개씩 뽑되, 정말 없으면 빈 배열 가능

JSON만 응답 (설명 금지):
{
  "summary": "이 제품에 대한 한 줄 총평",
  "pros": [{"point": "강점", "evidence": "근거 원문 1문장"}],
  "cons": [{"point": "약점", "evidence": "근거 원문 1문장"}],
  "target_persona": "이 제품이 가장 잘 맞을 것 같은 고객 타입 한 줄",
  "improvement_suggestions": ["개선 제안 1", "개선 제안 2"]
}`;

  const reqBody = {
    model: 'claude-sonnet-4-5-20250929',
    max_tokens: 2000,
    messages:[{role:'user', content: prompt}]
  };
  const fetchOpts = useProxy
    ? {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'}, // Apps Script preflight 회피
        body: JSON.stringify(reqBody)
      }
    : {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key': key,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body: JSON.stringify(reqBody)
      };
  try {
    const resp = await fetch(useProxy ? AI_PROXY_URL : 'https://api.anthropic.com/v1/messages', fetchOpts);
    if (!resp.ok){
      const txt = await resp.text();
      status.innerHTML = `<span style="color:var(--bad)">API 오류 ${resp.status}: ${esc(txt.slice(0,200))}</span>`;
      document.getElementById('aiRun').disabled = false;
      return;
    }
    const data = await resp.json();
    let txt = data.content?.[0]?.text || '';
    txt = txt.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
    const parsed = JSON.parse(txt);
    aiCache[p.code] = parsed;
    renderAiResult(document.getElementById('aiBox'), parsed, p);
  } catch(e){
    status.innerHTML = `<span style="color:var(--bad)">분석 실패: ${esc(String(e))}</span>`;
    document.getElementById('aiRun').disabled = false;
  }
}
document.getElementById('drill').onclick = (e)=>{ if(e.target.id==='drill') closeDrill(); };

// init
render('overview');
</script>
</body>
</html>
